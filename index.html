<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Habit Tracker XL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Habit XL">

    <link rel="icon" type="image/png" href="icona.png">
    <link rel="apple-touch-icon" href="icona.png">
    <meta name="theme-color" content="#4a90e2">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-theme="light">

<div class="container">
    <div class="card">
        <div class="header-top">
            <button class="theme-toggle" id="themeBtn">🌙</button>
            <h3 id="dateLabel">Oggi</h3>
            <button id="logoutBtn" class="theme-toggle hidden" onclick="handleLogout()" title="Logout">🚪</button>
        </div>

        <div id="authOverlay" class="auth-overlay hidden">
            <div class="auth-card">
                <h2 style="margin-top:0; color:var(--primary);">Benvenuto</h2>
                <p style="font-size:0.9em; color:var(--subtext); margin-bottom:20px;">Accedi per sincronizzare le tue abitudini.</p>
                <input type="email" id="authEmail" placeholder="Email" style="margin-bottom:10px;">
                <input type="password" id="authPassword" placeholder="Password" style="margin-bottom:15px;">
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-action" onclick="handleLogin()">ACCEDI</button>
                    <button class="btn-action" style="background:var(--success);" onclick="handleSignup()">REGISTRATI</button>
                </div>
                <div id="authError" style="color:var(--danger); font-size:0.8em; margin-top:10px; text-align:center;"></div>
            </div>
        </div>

        <div id="habitGrid" class="habit-grid"></div>
    </div>

    <div class="section-tabs">
        <div class="s-tab active" id="tab-cal" onclick="switchSection('calendar')">📅 Calendario</div>
        <div class="s-tab" id="tab-stats" onclick="switchSection('stats')">📊 Analisi</div>
    </div>

    <div id="calendar-section" class="card" style="border-radius: 0 0 20px 20px; margin-top: -1px;">
        <div class="nav-header">
            <button class="btn-action" onclick="changeMonth(-1)">◀</button>
            <b id="monthYear"></b>
            <button class="btn-action" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="stats-section" class="card hidden" style="border-radius: 0 0 20px 20px; margin-top: -1px;">
        <select id="habitSelector" onchange="onHabitSelectorChange()"></select>
        
        <div class="nav-header" style="margin-top:10px;">
            <button class="btn-action" onclick="changeStatsDate(-1)">◀</button>
            <b id="statsDateLabel"></b>
            <button class="btn-action" onclick="changeStatsDate(1)">▶</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="stat-card">
                <span style="display:block; font-size:1.3em; font-weight:bold; color:var(--primary);" id="statPerc">0%</span>
                <span style="font-size:0.7em; color:var(--subtext); font-weight:bold;">SUCCESSO</span>
            </div>
            <div class="stat-card">
                <span style="display:block; font-size:1.3em; font-weight:bold; color:var(--primary);" id="statCount">0</span>
                <span style="font-size:0.7em; color:var(--subtext); font-weight:bold;" id="statLabelCount">VOLTE</span>
            </div>
        </div>
        <canvas id="statsChart" style="margin-bottom: 20px; max-height: 200px;"></canvas>
        <div id="summaryList"></div>
        
        <button id="btnManageSelected" class="btn-action" style="width:100%; margin-top:20px; background:var(--tab-bg); color:var(--text);" onclick="manageSelectedHabit()">⚙️ GESTISCI QUESTA ABITUDINE</button>

        <div id="miniCalContainer" class="hidden">
            <div id="streakContainer"></div>
            <h4 style="text-align:center; font-size:0.85em; margin:15px 0 10px 0; color:var(--subtext);">Dettaglio Giornaliero:</h4>
            <div class="calendar-grid" id="miniCalendar"></div>
        </div>
    </div>

    <div class="backup-footer">
        <button class="btn-backup" onclick="exportData()">Esporta Backup</button>
        <button class="btn-backup" onclick="document.getElementById('importFile').click()">Importa Backup</button>
        <button class="btn-backup" style="color:var(--danger); border-color:var(--danger);" onclick="cleanupDatabase()">Pulisci Database</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>
</div>

<!-- Pulsante Flottante -->
<button class="fab" onclick="toggleEditor(true)" title="Aggiungi Abitudine">+</button>

<!-- Pannello Bottom-Sheet -->
<div id="editorOverlay" class="editor-overlay hidden" onclick="toggleEditor(false)">
    <div id="editorSheet" class="editor-sheet" onclick="event.stopPropagation()">
        <div class="sheet-header">
            <h3>Gestione Abitudini</h3>
            <button class="btn-close" onclick="toggleEditor(false)">✕</button>
        </div>
                <div class="editor-content">
                <div class="form-group">
                    <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">NOME ABITUDINE</label>
                    <input type="text" id="habitInput" placeholder="es. Bere Acqua">
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                    <div class="form-group" style="grid-column: span 1;">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">EMOJI</label>
                        <input type="text" id="habitEmoji" placeholder="es. 👟" style="text-align:center; font-size:1.2em;">
                    </div>
                    <div class="form-group" style="grid-column: span 1;">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">TIPO</label>
                        <select id="habitType" onchange="updateAdvUI()">
                            <option value="binary">Sì/No</option>
                            <option value="value">Valore Numerico</option>
                        </select>
                    </div>

                    <div style="grid-column: span 2; margin-bottom:10px;">
                        <div class="emoji-selector">
                            <span class="emoji-opt">🏃‍♂️</span>
                            <span class="emoji-opt">🏋️‍♂️</span>
                            <span class="emoji-opt">💧</span>
                            <span class="emoji-opt">🍎</span>
                            <span class="emoji-opt">🥗</span>
                            <span class="emoji-opt">🧘‍♂️</span>
                            <span class="emoji-opt">🚵‍♂️</span>
                            <span class="emoji-opt">🚶‍♂️</span>
                            <span class="emoji-opt">📚</span>
                            <span class="emoji-opt">💻</span>
                            <span class="emoji-opt">✍️</span>
                            <span class="emoji-opt">💡</span>
                            <span class="emoji-opt">🎨</span>
                            <span class="emoji-opt">🎸</span>
                            <span class="emoji-opt">🌿</span>
                            <span class="emoji-opt">🚭</span>
                            <span class="emoji-opt">💰</span>
                            <span class="emoji-opt">⏰</span>
                            <span class="emoji-opt">🛌</span>
                            <span class="emoji-opt">🦷</span>
                        </div>
                    </div>

                    <div style="grid-column: span 2; margin-bottom:10px;">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext); margin-bottom:10px; display:block;">COLORE</label>
                        <div class="color-selector">
                            <input type="hidden" id="habitColor" value="#4a90e2">
                            <div class="color-dot active" style="background:#4a90e2" data-color="#4a90e2"></div>
                            <div class="color-dot" style="background:#2ecc71" data-color="#2ecc71"></div>
                            <div class="color-dot" style="background:#ff4757" data-color="#ff4757"></div>
                            <div class="color-dot" style="background:#f39c12" data-color="#f39c12"></div>
                            <div class="color-dot" style="background:#9b59b6" data-color="#9b59b6"></div>
                            <div class="color-dot" style="background:#ff6b81" data-color="#ff6b81"></div>
                            <div class="color-dot" style="background:#1abc9c" data-color="#1abc9c"></div>
                            <div class="color-dot" style="background:#34495e" data-color="#34495e"></div>
                        </div>
                    </div>
                    <div class="adv-field">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">TARGET</label>
                        <input type="number" id="habitTarget" value="1" step="any">
                    </div>
                    <div class="adv-field">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">UNITÀ</label>
                        <input type="text" id="habitUnit" placeholder="es. L">
                    </div>
                    <div class="adv-field" style="grid-column: span 2;">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">INCREMENTO RAPIDO</label>
                        <input type="number" id="habitIncrement" value="1" step="any">
                    </div>

                    <div style="grid-column: span 2; margin-top:10px; border-top:1px solid var(--border); padding-top:15px;">
                        <label style="font-size:0.8em; font-weight:bold; color:var(--subtext);">FREQUENZA</label>
                        <select id="habitFrequency" onchange="updateFreqUI()">
                            <option value="daily">Ogni giorno</option>
                            <option value="days">Giorni specifici</option>
                            <option value="weekly">Settimanale</option>
                        </select>
                    </div>

                    <div id="freqDaysPanel" class="hidden" style="grid-column: span 2; margin-top:5px;">
                        <label style="font-size:0.75em; color:var(--subtext); margin-bottom:8px; display:block;">SELEZIONA GIORNI:</label>
                        <div class="day-selector">
                            <span class="freq-day" data-day="1">L</span>
                            <span class="freq-day" data-day="2">M</span>
                            <span class="freq-day" data-day="3">M</span>
                            <span class="freq-day" data-day="4">G</span>
                            <span class="freq-day" data-day="5">V</span>
                            <span class="freq-day" data-day="6">S</span>
                            <span class="freq-day" data-day="0">D</span>
                        </div>
                    </div>

                    <div id="freqWeeklyPanel" class="hidden" style="grid-column: span 2; margin-top:5px;">
                        <label style="font-size:0.75em; color:var(--subtext); margin-bottom:5px; display:block;">VOLTE A SETTIMANA:</label>
                        <input type="number" id="habitFreqWeekly" value="3" min="1" max="7">
                    </div>
                </div>

                <div style="margin-top:25px; display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-action" id="btnConfirmHabit" onclick="addHabit()" style="width:100%; padding:15px;">AGGIUNGI ABITUDINE</button>
                    
                    <button class="btn-action hidden" id="btnArchiveHabit" onclick="archiveHabit()" style="background:var(--warning); width:100%; padding:15px;">ARCHIVIA ABITUDINE</button>
                    <button class="btn-action hidden" id="btnRestoreHabit" onclick="restoreHabit()" style="background:var(--success); width:100%; padding:15px;">RIPRISTINA ABITUDINE</button>
                    
                    <button class="btn-action hidden" id="btnDeletePermanent" onclick="deleteHabitPermanent()" style="background:var(--danger); width:100%; padding:8px; font-size:0.75em; opacity:0.8; margin-top:10px;">ELIMINA DEFINITIVAMENTE (NON RECUPERABILE)</button>
                    
                    <input type="hidden" id="editHabitId" value="">
                </div>
            </div>
    </div>
</div>

<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
